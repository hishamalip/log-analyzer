<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log Analyzer Agent 🕵️‍♂️</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
    <main class="app-shell">
        <section class="panel">
            <header class="panel-header" style="text-align: center; margin-bottom: 28px;">
                <h1>Log Analyzer Agent 🕵️‍♂️🤖</h1>
                <p style="color: #64748b; font-size: 1rem; margin-top: 6px;">
                    Drop your application logs below to instantly discover root causes and smart fixes.
                </p>
            </header>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px;">
                <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; text-align: center;">
                    <span style="font-size: 1.5rem; display: block; margin-bottom: 4px;">❌</span>
                    <strong style="font-size: 0.85rem; color: #1e293b; display: block;">Error Extraction</strong>
                    <span style="font-size: 0.75rem; color: #64748b;">Finds critical failures fast</span>
                </div>
                <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; text-align: center;">
                    <span style="font-size: 1.5rem; display: block; margin-bottom: 4px;">🔍</span>
                    <strong style="font-size: 0.85rem; color: #1e293b; display: block;">Root Cause</strong>
                    <span style="font-size: 0.75rem; color: #64748b;">Breaks down bugs simply</span>
                </div>
                <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; text-align: center;">
                    <span style="font-size: 1.5rem; display: block; margin-bottom: 4px;">⚡</span>
                    <strong style="font-size: 0.85rem; color: #1e293b; display: block;">Next Steps</strong>
                    <span style="font-size: 0.75rem; color: #64748b;">Actionable fixing advice</span>
                </div>
            </div>

            <div class="upload-area">
                <label class="file-label" for="fileInput">
                    <span id="fileLabel">📁 Click to browse or drop a .txt / .log file</span>
                    <input type="file" id="fileInput" accept=".txt,.log" />
                </label>
                <button id="analyseBtn">Analyse Logs 🚀</button>
            </div>

            <div id="loader" class="loader" aria-live="polite">
                <span class="spinner"></span>
                <span style="font-weight: 500;">SRE Agent is reviewing segments... 🧠</span>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 10px 16px; border-radius: 12px 12px 0 0; margin-bottom: -1px; border: 1px solid #334155; border-bottom: none;">
                <div style="display: flex; gap: 6px;">
                    <span style="width: 10px; height: 10px; background: #ef4444; border-radius: 50%;"></span>
                    <span style="width: 10px; height: 10px; background: #eab308; border-radius: 50%;"></span>
                    <span style="width: 10px; height: 10px; background: #22c55e; border-radius: 50%;"></span>
                </div>
                <span style="color: #94a3b8; font-family: monospace; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">
                    📋 AI Engineering Report
                </span>
            </div>

            <textarea
                id="logOutput"
                class="log-output"
                style="border-top-left-radius: 0; border-top-right-radius: 0;"
                readonly
                placeholder="Analysis results will appear here after optimization completes..."
            ></textarea>
        </section>
    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        const analyseBtn = document.getElementById('analyseBtn');
        const logOutput = document.getElementById('logOutput');
        const loader = document.getElementById('loader');
        const fileLabel = document.getElementById('fileLabel');

        fileInput.addEventListener('change', function () {
            if (fileInput.files.length > 0) {
                fileLabel.innerHTML = `✅ <strong>Selected:</strong> ${fileInput.files[0].name}`;
            } else {
                fileLabel.textContent = '📁 Click to browse or drop a .txt / .log file';
            }
        });

        analyseBtn.addEventListener('click', async function () {
            if (fileInput.files.length === 0) {
                logOutput.value = '❌ [ERROR] No file selected. Please select a valid log file first.';
                return;
            }

            const file = fileInput.files[0];
            if (!file.name.endsWith('.txt') && !file.name.endsWith('.log')) {
                logOutput.value = '❌ [ERROR] Only .txt or .log files are allowed.';
                return;
            }

            const maxSize = 1 * 1024 * 1024; // 1MB Limit
            if (file.size > maxSize) {
                logOutput.value = '❌ [ERROR] File size exceeds the 1MB safety threshold.';
                return;
            }

            logOutput.value = '⏳ [INFO] Reading segments and routing data to LLM engine...';
            loader.classList.add('active');
            analyseBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Analysis cycle failed');
                }

                logOutput.value = result.analysis || '⚠️ No analysis was generated.';
            } catch (error) {
                logOutput.value = `❌ [ERROR] ${error.message}`;
            } finally {
                loader.classList.remove('active');
                analyseBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
